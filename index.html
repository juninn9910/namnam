<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쩡이네 저녁 만찬</title>
    <link href="https://fonts.googleapis.com/css2?family=Hi+Melody&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #e8d5b5; 
            color: #4d3a2b;
            font-family: 'Hi Melody', sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { font-size: 3rem; margin-bottom: 20px; color: #8b0000; }
        .section-box {
            border: 2px solid #8b5a2b;
            padding: 20px;
            margin: 15px auto;
            max-width: 480px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        h2 { font-size: 1.8rem; margin-top: 0; border-bottom: 2px dashed #8b5a2b; padding-bottom: 10px; }
        
        .member-btn {
            background-color: #f4e3c5;
            color: #8b5a2b;
            border: 2px solid #8b5a2b;
            padding: 8px 15px;
            font-size: 1.4rem; /* 크기 유지 */
            font-family: 'Hi Melody', sans-serif;
            cursor: pointer;
            margin: 5px;
            border-radius: 10px;
        }
        .member-btn.active {
            background-color: #d2691e;
            color: #fff;
        }
        .pass-btn { background-color: #777; color: #fff; border: 2px solid #555; width: 90%; font-size: 1.3rem; margin-top: 5px; }
        .pass-btn.active { background-color: #333; color: #fff; }

        .input-group { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; flex-direction: column; align-items: center; }
        .input-row { display: flex; width: 100%; justify-content: center; gap: 5px; }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            font-size: 1.4rem;
            font-family: 'Hi Melody', sans-serif;
            border: 2px solid #8b5a2b;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .btn {
            color: #fff;
            border: none;
            padding: 10px 15px;
            font-size: 1.4rem;
            font-family: 'Hi Melody', sans-serif;
            cursor: pointer;
            border-radius: 5px;
        }
        .submit-btn { background-color: #8b0000; width: 25%; }
        .roulette-btn { background-color: #d2691e; width: 85%; }
        .decide-btn { background-color: #006400; width: 85%; margin-top: 5px;}
        
        .copy-btn { background-color: #4682b4; width: 100%; margin-top: 5px; font-size: 1.4rem; display: none; }
        .toggle-btn { background-color: #8b5a2b; width: 100%; margin-top: 10px; font-size: 1.4rem; text-align: left; padding-left: 15px; }
        
        .veto-btn {
            background-color: #eee;
            color: #8b0000;
            border: 1px solid #8b0000;
            padding: 3px 8px;
            font-size: 1.1rem;
            font-family: 'Hi Melody', sans-serif;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 10px;
        }

        ul { text-align: left; list-style-type: none; padding: 0; font-size: 1.5rem; margin-top: 10px; }
        li { border-bottom: 1px dashed #8b5a2b; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .user-tag { font-weight: bold; color: #b22222; margin-right: 10px; }
        .date-tag { font-size: 1.1rem; color: #777; white-space: nowrap; margin-left: 10px; }
        .vetoed-text { text-decoration: line-through; color: #999; }
        
        #today-decision-board {
            font-size: 1.8rem;
            color: #006400;
            font-weight: bold;
            margin: 15px 0;
            padding: 10px;
            background-color: rgba(0, 100, 0, 0.1);
            border-radius: 5px;
            border: 1px solid #006400;
        }
    </style>
</head>
<body>

    <h1>🏮 쩡이네 저녁 만찬</h1>

    <div class="section-box">
        <h2>👥 1. 출석체크</h2>
        <button class="member-btn" data-user="쩡이">쩡이</button>
        <button class="member-btn" data-user="엄마">엄마</button>
        <button class="member-btn" data-user="아빠">아빠</button>
        <button class="member-btn" data-user="오빠">오빠</button>
        <br>
        <button class="btn pass-btn" id="passBtn">오늘 저녁 패스! 🙋‍♀️</button>
    </div>

    <div class="section-box">
        <h2>🥘 2. 메뉴 추천</h2>
        <div class="input-row">
            <input type="text" id="menuInput" placeholder="메뉴 입력" style="width: 65%; margin-bottom: 0;">
            <button class="btn submit-btn" id="submitBtn">던지기</button>
        </div>
        <button class="btn roulette-btn" id="rouletteBtn" style="margin-top: 10px;">🎲 역대 메뉴 랜덤 뽑기</button>
    </div>

    <div class="section-box">
        <h2>📜 3. 실시간 제안</h2>
        <ul id="menu-list"></ul>
    </div>

    <div class="section-box">
        <h2>🔨 4. 최종 메뉴 판결</h2>
        
        <div id="today-decision-board">오늘의 메뉴를 정해주세요! 🍽️</div>
        <button class="btn copy-btn" id="copyAgainBtn">📋 카톡 공유</button>
        
        <div id="initial-decide-area">
            <hr style="border: 0; border-top: 1px dashed #8b5a2b; margin: 15px 0;">
            <input type="text" id="finalInput" placeholder="최종 메뉴 입력">
            <button class="btn decide-btn" id="decideBtn">확정! 📢</button>
            <p style="font-size: 1.1rem; color: #555; margin-top: 5px;">(확정 시 카톡 문구 자동 복사)</p>
        </div>

        <div id="change-decide-area" style="display: none; margin-top: 15px; border-top: 1px dashed #8b0000; padding-top: 15px;">
            <p style="color: #8b0000; font-weight: bold; font-size: 1.3rem; margin-bottom: 10px;">🚨 메뉴 변경</p>
            <input type="text" id="newFinalInput" placeholder="새 메뉴">
            <input type="text" id="changeReasonInput" placeholder="변경 사유">
            <button class="btn" id="changeDecideBtn" style="background-color: #8b0000; width: 85%; margin-top: 5px;">메뉴 바꾸기 🔄</button>
        </div>
    </div>

    <div class="section-box">
        <h2>🗂️ 5. 역대 기록</h2>
        <button class="btn toggle-btn" id="toggleDecisionBtn">🏆 확정 메뉴 ▼</button>
        <ul id="history-decision-list" style="display: none;"></ul>

        <button class="btn toggle-btn" id="toggleMenuBtn" style="margin-top: 15px;">📜 탈락 메뉴 ▼</button>
        <ul id="history-menu-list" style="display: none;"></ul>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg0dkoRFZ0QWmR6-N6VL5MXQsI_yA5DwI",
            authDomain: "namnam-54db4.firebaseapp.com",
            projectId: "namnam-54db4",
            storageBucket: "namnam-54db4.firebasestorage.app",
            messagingSenderId: "762819520735",
            appId: "1:762819520735:web:0eedf9ae418747a7c7216a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = "";
        let pastDecisions = [];
        let globalShareText = ""; 
        
        function getTodayString() {
            return new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
        }

        const btns = document.querySelectorAll('.member-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentUser = btn.getAttribute('data-user');
                document.getElementById('passBtn').classList.remove('active');
            });
        });

        const passBtn = document.getElementById('passBtn');
        passBtn.addEventListener('click', async () => {
            if (!currentUser) { alert("가족 구성원을 먼저 선택해 주세요."); return; }
            try {
                await addDoc(collection(db, "menus"), {
                    user: currentUser,
                    text: "오늘 저녁 패스 ❌",
                    date: getTodayString(),
                    vetoed: false,
                    createdAt: serverTimestamp()
                });
                passBtn.classList.add('active');
                alert("저녁 패스 의견이 전달되었습니다.");
            } catch (e) { alert("오류가 발생했습니다."); }
        });

        const menuInput = document.getElementById('menuInput');
        const submitBtn = document.getElementById('submitBtn');
        
        submitBtn.addEventListener('click', async () => {
            if (!currentUser) { alert("가족 구성원을 먼저 선택해 주세요."); return; }
            const text = menuInput.value.trim();
            if (!text) { alert("메뉴 이름을 입력해 주세요."); return; }

            try {
                await addDoc(collection(db, "menus"), {
                    user: currentUser,
                    text: text,
                    date: getTodayString(),
                    vetoed: false,
                    createdAt: serverTimestamp()
                });
                menuInput.value = "";
            } catch (e) { alert("의견 전송에 실패했습니다."); }
        });

        const rouletteBtn = document.getElementById('rouletteBtn');
        rouletteBtn.addEventListener('click', () => {
            if (pastDecisions.length === 0) {
                alert("아직 쌓인 메뉴가 없습니다.");
                return;
            }
            const randomIndex = Math.floor(Math.random() * pastDecisions.length);
            menuInput.value = pastDecisions[randomIndex];
        });

        const menuList = document.getElementById('menu-list');
        const historyMenuList = document.getElementById('history-menu-list');
        const qMenus = query(collection(db, "menus"), orderBy("createdAt", "desc"));
        
        onSnapshot(qMenus, (snapshot) => {
            menuList.innerHTML = "";
            historyMenuList.innerHTML = "";
            const todayStr = getTodayString();

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id;
                
                const liHistory = document.createElement("li");
                liHistory.innerHTML = `
                    <span style="flex: 1;">
                        <span class="user-tag">[${data.user}]</span> 
                        <span class="${data.vetoed ? 'vetoed-text' : ''}">${data.text}</span>
                    </span> 
                    <div style="text-align: right;">
                        ${data.vetoed ? '<span style="color: #999; font-size: 1rem;">(별로) </span>' : ''}
                        <span class="date-tag">${data.date || ''}</span>
                    </div>
                `;
                historyMenuList.appendChild(liHistory);

                if (data.date === todayStr) {
                    const liToday = document.createElement("li");
                    const textSpan = document.createElement("span");
                    textSpan.style.flex = "1";
                    textSpan.innerHTML = `<span class="user-tag">[${data.user}]</span> <span class="${data.vetoed ? 'vetoed-text' : ''}">${data.text}</span>`;
                    
                    const rightDiv = document.createElement("div");
                    
                    if (!data.vetoed && !data.text.includes("패스")) {
                        const vetoBtn = document.createElement("button");
                        vetoBtn.className = "veto-btn";
                        vetoBtn.textContent = "별로 ❌";
                        vetoBtn.onclick = async () => {
                            if(confirm(`[${data.text}] 메뉴를 거절할까요?`)) {
                                await updateDoc(doc(db, "menus", docId), { vetoed: true });
                            }
                        };
                        rightDiv.appendChild(vetoBtn);
                    } else if (data.vetoed) {
                        const vetoMsg = document.createElement("span");
                        vetoMsg.style.color = "#999";
                        vetoMsg.style.fontSize = "1rem";
                        vetoMsg.textContent = " (별로) ";
                        rightDiv.appendChild(vetoMsg);
                    }

                    const dateSpan = document.createElement("span");
                    dateSpan.className = "date-tag";
                    dateSpan.textContent = data.date || '';
                    rightDiv.appendChild(dateSpan);

                    liToday.appendChild(textSpan);
                    liToday.appendChild(rightDiv);
                    menuList.appendChild(liToday);
                }
            });
        });

        const finalInput = document.getElementById('finalInput');
        const decideBtn = document.getElementById('decideBtn');
        const todayDecisionBoard = document.getElementById('today-decision-board');
        const copyAgainBtn = document.getElementById('copyAgainBtn');
        const historyDecisionList = document.getElementById('history-decision-list');
        
        const initialDecideArea = document.getElementById('initial-decide-area');
        const changeDecideArea = document.getElementById('change-decide-area');
        const newFinalInput = document.getElementById('newFinalInput');
        const changeReasonInput = document.getElementById('changeReasonInput');
        const changeDecideBtn = document.getElementById('changeDecideBtn');

        decideBtn.addEventListener('click', async () => {
            const finalMenu = finalInput.value.trim();
            if (!finalMenu) { alert("메뉴를 입력해 주세요."); return; }

            try {
                await addDoc(collection(db, "decisions"), {
                    menu: finalMenu,
                    date: getTodayString(),
                    createdAt: serverTimestamp()
                });
                finalInput.value = "";
            } catch (e) { alert("오류가 발생했습니다."); }
        });

        changeDecideBtn.addEventListener('click', async () => {
            const newMenu = newFinalInput.value.trim();
            const reason = changeReasonInput.value.trim();
            
            if (!newMenu || !reason) { 
                alert("새 메뉴와 사유를 모두 입력해 주세요."); 
                return; 
            }

            try {
                await addDoc(collection(db, "decisions"), {
                    menu: newMenu,
                    date: getTodayString(),
                    reason: reason,
                    createdAt: serverTimestamp()
                });
                
                const shareText = `📢 메뉴 변경: [${newMenu}]\n(사유: ${reason})\n서둘러 귀가하세요 🏃‍♂️`;
                navigator.clipboard.writeText(shareText).then(() => {
                    alert("변경 완료!\n카톡에 붙여넣기 하세요.");
                }).catch(err => {
                    alert("메뉴 변경 완료!");
                });

                newFinalInput.value = "";
                changeReasonInput.value = "";
            } catch (e) { alert("오류가 발생했습니다."); }
        });

        copyAgainBtn.addEventListener('click', () => {
            if (!globalShareText) return;
            navigator.clipboard.writeText(globalShareText).then(() => {
                alert("복사 완료!\n카톡에 붙여넣기 하세요.");
            }).catch(err => {
                alert("복사 실패.");
            });
        });

        const qDecisions = query(collection(db, "decisions"), orderBy("createdAt", "desc"));
        onSnapshot(qDecisions, (snapshot) => {
            historyDecisionList.innerHTML = "";
            todayDecisionBoard.textContent = "오늘의 메뉴를 정해주세요! 🍽️"; 
            copyAgainBtn.style.display = "none";
            globalShareText = "";
            pastDecisions = [];
            
            const todayStr = getTodayString();
            let todayFound = false;

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                pastDecisions.push(data.menu);
                
                if (data.date === todayStr && !todayFound) {
                    if (data.reason) {
                        todayDecisionBoard.innerHTML = `🎉 오늘(${data.date}) 메뉴: [${data.menu}] 🎉<br><span style="font-size: 1.2rem; color: #8b0000; display: block; margin-top: 10px;">(사유: ${data.reason})</span>`;
                        globalShareText = `📢 메뉴 변경: [${data.menu}]\n(사유: ${data.reason})\n서둘러 귀가하세요 🏃‍♂️`;
                    } else {
                        todayDecisionBoard.innerHTML = `🎉 오늘(${data.date}) 메뉴: [${data.menu}] 🎉`;
                        globalShareText = `📢 오늘 쩡이네 저녁은 [${data.menu}] 확정! 서둘러 귀가하세요 🏃‍♂️`;
                    }
                    
                    copyAgainBtn.style.display = "block"; 
                    initialDecideArea.style.display = "none"; 
                    changeDecideArea.style.display = "block"; 
                    
                    todayFound = true; 
                } else {
                    const li = document.createElement("li");
                    let historyHtml = `<span>🍴 ${data.menu}</span>`;
                    if (data.reason) {
                        historyHtml += ` <span style="font-size: 1.1rem; color: #8b0000; margin-left: 5px;">(${data.reason})</span>`;
                    }
                    historyHtml += ` <span class="date-tag" style="float: right;">${data.date || ''}</span>`;
                    li.innerHTML = historyHtml;
                    historyDecisionList.appendChild(li);
                }
            });
            
            if (!todayFound) {
                initialDecideArea.style.display = "block";
                changeDecideArea.style.display = "none";
            }
        });

        const toggleDecisionBtn = document.getElementById('toggleDecisionBtn');
        toggleDecisionBtn.addEventListener('click', () => {
            if (historyDecisionList.style.display === "none") {
                historyDecisionList.style.display = "block";
                toggleDecisionBtn.textContent = "🏆 확정 메뉴 ▲";
            } else {
                historyDecisionList.style.display = "none";
                toggleDecisionBtn.textContent = "🏆 확정 메뉴 ▼";
            }
        });

        const toggleMenuBtn = document.getElementById('toggleMenuBtn');
        toggleMenuBtn.addEventListener('click', () => {
            if (historyMenuList.style.display === "none") {
                historyMenuList.style.display = "block";
                toggleMenuBtn.textContent = "📜 탈락 메뉴 ▲";
            } else {
                historyMenuList.style.display = "none";
                toggleMenuBtn.textContent = "📜 탈락 메뉴 ▼";
            }
        });
    </script>
</body>
</html>
